name: HEICConverter
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  HEICConverter:
    type: application
    platform: macOS
    sources:
      - path: HEICConverter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hunterbrewer.heicconverter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: HEICConverter/Info.plist
